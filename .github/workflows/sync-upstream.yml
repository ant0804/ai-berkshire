name: Sync Upstream

on:
  schedule:
    - cron: '0 4 * * *'     # 每天北京时间中午12点左右（UTC+8），可自行修改
  workflow_dispatch:        # 支持手动触发

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}   # 仅在 fork 仓库运行

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # 拉取完整历史

      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_repo: "xbtlin/ai-berkshire"   # 例如：torvalds/linux
          upstream_branch: "main"                   # 上游分支，通常是 main 或 master
          target_branch: "main"                     # 你 fork 中的目标分支
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
